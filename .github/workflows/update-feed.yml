name: Update Vileta YML Feed

on:
  schedule:
    - cron: '0 3 * * *'  # каждый день в 03:00 UTC (06:00 мск)
  workflow_dispatch:       # ручной запуск кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fix script
        run: python fix_yml.py

      - name: Commit and push result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/feed.yml
          git diff --staged --quiet || git commit -m "Update feed.yml"
          git push
